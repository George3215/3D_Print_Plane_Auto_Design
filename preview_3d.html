<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex V8 - 3D Perspective Viewer</title>
    <!-- 引入谷歌 3D 渲染库 -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; text-align: center; color: #58a6ff; border-bottom: 1px solid #30363d; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; background-color: #0d1117; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(22, 27, 34, 0.8); padding: 10px 20px; border-radius: 30px; border: 1px solid #30363d; color: white; font-size: 14px; pointer-events: none; }
        .footer { padding: 10px; text-align: center; font-size: 12px; color: #8b949e; background: #161b22; }
    </style>
</head>
<body>

<header>
    <h1>✈️ Apex V8 RC Aircraft - 3D Model Explorer</h1>
    <p>360° 全方位交互预览窗口</p>
</header>

<!-- 3D 预览核心组件 -->
<model-viewer 
    src="assets/v8_apex_preview.stl" 
    alt="Apex V8 Aircraft Model"
    auto-rotate 
    camera-controls 
    shadow-intensity="1.5"
    stage-light-intensity="2" 
    environment-intensity="1.5"
    interaction-prompt="auto"
    exposure="1"
    camera-orbit="45deg 75deg 105%"
    min-camera-orbit="auto auto auto"
    max-camera-orbit="auto auto 200%">
</model-viewer>

<div class="controls">
    左键拖拽旋转 | 滚轮缩放 | 右键平移
</div>

<footer class="footer">
    Developed by Antigravity AI | Project: 3D_Print_Plane_Auto_Design
</footer>

</body>
</html>
